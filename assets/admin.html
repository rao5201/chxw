<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶海虾王 - 管理后台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #f4f6f9; font-family: Arial; }
        .sidebar { width: 250px; background: #2c3e50; color: white; position: fixed; top: 0; left: 0; height: 100%; padding: 20px 0; }
        .main { margin-left: 250px; padding: 40px; }
        .menu { cursor: pointer; }
        .active { background: #e60012 !important; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="text-center mb-8">
        <div class="w-16 h-16 rounded-full overflow-hidden mx-auto mb-2">
            <img src="logo.jpg" alt="茶海虾王" class="w-full h-full object-cover">
        </div>
        <h3 class="font-bold">茶海虾王 管理后台</h3>
        <p class="text-xs text-gray-400 mt-1">武穴茶海虾王电子商务中心</p>
    </div>
    <ul class="px-4 space-y-2">
        <li><a class="menu block p-3 rounded bg-red-600 active" data-page="dashboard">数据看板</a></li>
        <li><a class="menu block p-3 rounded" data-page="products">商品管理</a></li>
        <li><a class="menu block p-3 rounded" data-page="orders">订单管理</a></li>
        <li><a class="menu block p-3 rounded" data-page="logistics">物流管理</a></li>
    </ul>
    <div class="absolute bottom-10 px-4 text-xs text-gray-400">
        <p>技术支持：rao5201@126.com</p>
        <p>管理方：海南茶海虾王管理有限公司</p>
    </div>
</div>

<div class="main">
    <div id="dashboard" class="page block">
        <h1 class="text-2xl font-bold mb-6">数据概览</h1>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <div class="bg-white p-5 rounded shadow">商品总数：<span id="p-count">0</span></div>
            <div class="bg-white p-5 rounded shadow">订单总数：<span id="o-count">0</span></div>
            <div class="bg-white p-5 rounded shadow">今日订单：0</div>
            <div class="bg-white p-5 rounded shadow">今日销售额：¥0</div>
        </div>
    </div>

    <div id="products" class="page hidden">
        <h1 class="text-2xl font-bold mb-6">商品管理</h1>
        <div class="bg-white p-6 rounded shadow mb-6">
            <input id="title" placeholder="商品名称" class="border p-2 w-40 mr-2">
            <input id="price" placeholder="价格（分）" class="border p-2 w-32 mr-2">
            <input id="stock" placeholder="库存" class="border p-2 w-24 mr-2">
            <button onclick="addProduct()" class="bg-red-600 text-white px-4 py-2 rounded">添加商品</button>
        </div>
        <div class="bg-white p-6 rounded shadow">
            <table class="w-full text-left">
                <thead><tr><th>ID</th><th>商品名</th><th>价格</th><th>库存</th><th>操作</th></tr></thead>
                <tbody id="product-table"></tbody>
            </table>
        </div>
    </div>

    <div id="orders" class="page hidden">
        <h1 class="text-2xl font-bold mb-6">订单管理</h1>
        <div class="bg-white p-6 rounded shadow">
            <table class="w-full text-left">
                <thead><tr><th>订单号</th><th>金额</th><th>状态</th><th>时间</th></tr></thead>
                <tbody id="order-table"></tbody>
            </table>
        </div>
    </div>

    <div id="logistics" class="page hidden">
        <h1 class="text-2xl font-bold mb-6">物流管理</h1>
        <div class="bg-white p-6 rounded shadow mb-6">
            <input id="l-order" placeholder="订单号" class="border p-2 w-40 mr-2">
            <input id="l-status" placeholder="物流状态" class="border p-2 w-40 mr-2">
            <button onclick="updateLogistics()" class="bg-red-600 text-white px-4 py-2 rounded">更新</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://gdxrqdbotbbbmbmdxdmz.supabase.co";
const SUPABASE_KEY = "sb_publishable_YlWCJpoYZY_fkMQ4Jfxvww_THe8_CJ4";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

document.querySelectorAll(".menu").forEach(m => {
    m.addEventListener("click", () => {
        document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
        document.querySelectorAll(".menu").forEach(x => x.classList.remove("active", "bg-red-600"));
        document.getElementById(m.dataset.page).classList.remove("hidden");
        m.classList.add("active", "bg-red-600");
    });
});

async function loadProducts() {
    const { data } = await supabase.from("products").select("*");
    const tb = document.getElementById("product-table");
    const count = document.getElementById("p-count");
    tb.innerHTML = "";
    data.forEach(p => {
        const price = (p.price / 100).toFixed(2);
        tb.innerHTML += `<tr class="border-b"><td>${p.id}</td><td>${p.title}</td><td>¥${price}</td><td>${p.stock}</td><td><button onclick="del(${p.id})" class="text-red-600">删除</button></td></tr>`;
    });
    count.innerText = data.length;
}

async function addProduct() {
    const title = document.getElementById("title").value;
    const price = parseInt(document.getElementById("price").value);
    const stock = parseInt(document.getElementById("stock").value);
    if (!title || !price || !stock) { alert("请填写完整"); return; }
    await supabase.from("products").insert([{ title, price, stock }]);
    alert("添加成功");
    loadProducts();
}

async function del(id) {
    await supabase.from("products").delete().eq("id", id);
    alert("删除成功");
    loadProducts();
}

function loadOrders() {
    const orders = JSON.parse(localStorage.getItem("chxw_orders")) || [];
    const tb = document.getElementById("order-table");
    const count = document.getElementById("o-count");
    tb.innerHTML = "";
    orders.forEach(o => {
        tb.innerHTML += `<tr class="border-b"><td>${o.orderNo}</td><td>¥${o.total.toFixed(2)}</td><td>${o.status}</td><td>${o.createTime}</td></tr>`;
    });
    count.innerText = orders.length;
}

function updateLogistics() {
    const no = document.getElementById("l-order").value;
    const sta = document.getElementById("l-status").value;
    if (!no || !sta) { alert("请填写完整"); return; }
    alert(`订单 ${no} 物流已更新：${sta}`);
}

window.onload = () => { loadProducts(); loadOrders(); };
</script>
</body>
</html>
