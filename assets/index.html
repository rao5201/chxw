<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶海虾王-电商综合平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-red: #E60012; --primary-gold: #FFD700; --gray-light: #f4f4f4; }
        body { background: var(--gray-light); font-family: "PingFang SC"; padding-bottom: 80px; }
        .brand-red { background: var(--primary-red); }
        .text-gold { color: var(--primary-gold); }
        .bg-gold { background: var(--primary-gold); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 999; }
        .modal-content { background: white; width: 90%; max-width: 500px; margin: 50px auto; padding: 20px; border-radius: 10px; }
        .logistics-item { border-left: 2px solid var(--primary-red); padding-left: 15px; margin: 10px 0; position: relative; }
        .logistics-item::before { content: ""; width: 10px; height: 10px; background: var(--primary-red); border-radius: 50%; position: absolute; left: -6px; top: 0; }
    </style>
</head>
<body>

<header class="brand-red sticky top-0 z-50 shadow-md">
    <div class="container mx-auto px-4 py-3">
        <div class="flex items-center justify-between mb-3">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 rounded-full overflow-hidden shadow-inner bg-white">
                    <img src="logo.jpg" alt="茶海虾王" class="w-full h-full object-cover">
                </div>
                <div>
                    <h1 class="text-xl font-bold text-white tracking-wider">茶海虾王 CHXW</h1>
                    <p class="text-xs text-gold">官方旗舰商城</p>
                </div>
            </div>
            <div class="flex gap-4 text-white">
                <div id="user-btn"><i class="fas fa-user text-2xl"></i></div>
                <div id="cart-btn" class="relative">
                    <i class="fas fa-shopping-cart text-2xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-gold text-red-600 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
                </div>
            </div>
        </div>
        <div class="relative">
            <input type="text" placeholder="搜索商品..." class="w-full py-2 px-4 rounded-l-lg focus:outline-none">
            <button class="absolute right-0 top-0 h-full bg-gold text-red-600 px-4 font-bold">搜索</button>
        </div>
    </div>
</header>

<div class="bg-white text-xs text-gray-500 text-center py-2">
    运营方：武穴茶海虾王电子商务中心 | 管理方：海南茶海虾王管理有限责任公司 | 客服：rao5201@126.com | 支持：微信/支付宝/银行卡
</div>

<section class="container mx-auto px-4 mt-6 mb-20">
    <h2 class="font-bold text-lg mb-4 border-l-4 border-red-600 pl-2">热销爆款</h2>
    <div id="product-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</section>

<nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-50 text-xs">
    <a class="flex flex-col items-center text-red-600"><i class="fas fa-home text-lg mb-1"></i>首页</a>
    <a href="admin.html" class="flex flex-col items-center text-gray-600"><i class="fas fa-cog text-lg mb-1"></i>后台</a>
    <a id="cart-nav" class="flex flex-col items-center text-gray-600"><i class="fas fa-shopping-bag text-lg mb-1"></i>购物车</a>
    <a id="user-nav" class="flex flex-col items-center text-gray-600"><i class="fas fa-user text-lg mb-1"></i>我的</a>
</nav>

<div class="modal" id="login-modal">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg">登录 / 注册</h3>
            <button class="close-modal text-gray-500">×</button>
        </div>
        <div class="mb-3"><label class="block text-sm mb-1">手机号</label><input type="tel" class="w-full border p-2 rounded"></div>
        <div class="mb-3"><label class="block text-sm mb-1">验证码</label><div class="flex gap-2"><input class="flex-1 border p-2 rounded"><button class="bg-red-600 text-white px-3 rounded">获取</button></div></div>
        <button class="w-full bg-red-600 text-white p-2 rounded">登录 / 注册</button>
    </div>
</div>

<div class="modal" id="cart-modal">
    <div class="modal-content">
        <div class="flex justify-between mb-4"><h3 class="font-bold">购物车</h3><button class="close-modal">×</button></div>
        <div id="cart-list" class="mb-4"></div>
        <div class="border-t pt-3 flex justify-between"><span class="font-bold">总计：<span id="cart-total">¥0.00</span></span><button id="checkout-btn" class="bg-red-600 text-white px-4 py-2 rounded">去结算</button></div>
    </div>
</div>

<div class="modal" id="checkout-modal">
    <div class="modal-content">
        <div class="flex justify-between mb-4"><h3 class="font-bold">提交订单</h3><button class="close-modal">×</button></div>
        <div class="mb-3"><label class="text-sm">收货地址</label><input class="w-full border p-2 rounded"></div>
        <div class="mb-3"><label class="text-sm">收货人 & 电话</label><input class="w-full border p-2 rounded"></div>
        <div class="mb-3"><label class="text-sm">支付方式</label><div class="flex gap-3"><label><input type="radio" name="pay" value="wechat" checked> 微信</label><label><input type="radio" name="pay" value="alipay"> 支付宝</label><label><input type="radio" name="pay" value="card"> 银行卡</label></div></div>
        <button id="submit-order" class="w-full bg-red-600 text-white p-2 rounded">确认下单</button>
    </div>
</div>

<div class="modal" id="logistics-modal">
    <div class="modal-content">
        <div class="flex justify-between mb-4"><h3 class="font-bold">物流查询</h3><button class="close-modal">×</button></div>
        <div class="mb-3"><input id="order-no" class="w-full border p-2 rounded" placeholder="输入订单号"></div>
        <button id="query-logistics" class="w-full bg-red-600 text-white p-2 rounded mb-4">查询</button>
        <div id="logistics-list"></div>
    </div>
</div>

<div class="modal" id="user-modal">
    <div class="modal-content">
        <div class="flex justify-between mb-4"><h3 class="font-bold">个人中心</h3><button class="close-modal">×</button></div>
        <div class="grid grid-cols-3 gap-2 mb-4">
            <div class="bg-gray-100 p-3 rounded text-center"><i class="fas fa-shopping-cart text-red-600 text-xl mb-1"></i><p class="text-xs">我的订单</p></div>
            <div id="logistics-btn" class="bg-gray-100 p-3 rounded text-center"><i class="fas fa-truck text-blue-500 text-xl mb-1"></i><p class="text-xs">物流查询</p></div>
            <div class="bg-gray-100 p-3 rounded text-center"><i class="fas fa-cog text-gray-500 text-xl mb-1"></i><p class="text-xs">账户设置</p></div>
        </div>
        <div class="border-t pt-3"><h4 class="font-medium mb-2">我的订单</h4><div id="user-order-list" class="text-center text-gray-500">暂无订单</div></div>
    </div>
</div>

<script>
const SUPABASE_URL = "https://gdxrqdbotbbbmbmdxdmz.supabase.co";
const SUPABASE_KEY = "sb_publishable_YlWCJpoYZY_fkMQ4Jfxvww_THe8_CJ4";
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let cart = JSON.parse(localStorage.getItem("chxw_cart")) || [];
let orders = JSON.parse(localStorage.getItem("chxw_orders")) || [];

async function loadProducts() {
    const { data } = await supabase.from("products").select("*");
    const el = document.getElementById("product-list");
    el.innerHTML = "";
    data.forEach(p => {
        const price = (p.price / 100).toFixed(2);
        el.innerHTML += `
        <div class="bg-white rounded-lg shadow p-3 relative">
            <span class="absolute top-1 left-1 bg-red-600 text-white text-xs px-2 rounded">热卖</span>
            <div class="h-40 bg-gray-50 flex items-center justify-center rounded mb-2">
                ${p.image_url ? `<img src="${p.image_url}" class="h-full object-contain">` : '<span class="text-4xl">🍵🦞</span>'}
            </div>
            <h3 class="text-sm truncate font-medium">${p.title}</h3>
            <div class="flex justify-between items-center mt-2">
                <span class="text-red-600 font-bold">¥${price}</span>
                <button class="add-cart bg-red-600 text-white text-xs px-2 py-1 rounded" data-id="${p.id}" data-title="${p.title}" data-price="${p.price}">加入购物车</button>
            </div>
        </div>`;
    });
    document.querySelectorAll(".add-cart").forEach(btn => {
        btn.addEventListener("click", () => {
            const id = btn.dataset.id;
            const exist = cart.find(i => i.id === id);
            if (exist) exist.quantity++;
            else cart.push({ id, title: btn.dataset.title, price: btn.dataset.price, quantity: 1 });
            localStorage.setItem("chxw_cart", JSON.stringify(cart));
            updateCartCount();
            alert("加入购物车成功！");
        });
    });
}

function updateCartCount() {
    const total = cart.reduce((s, i) => s + i.quantity, 0);
    document.getElementById("cart-count").innerText = total;
}

function renderCart() {
    const el = document.getElementById("cart-list");
    const totalEl = document.getElementById("cart-total");
    if (cart.length === 0) { el.innerHTML = "<div class='py-6 text-gray-500'>购物车为空</div>"; totalEl.innerText = "¥0.00"; return; }
    let html = "";
    let total = 0;
    cart.forEach(i => {
        const pr = i.price * i.quantity / 100;
        total += pr;
        html += `<div class="flex justify-between py-2 border-b"><div>${i.title} ×${i.quantity}</div><div>¥${pr.toFixed(2)}</div></div>`;
    });
    el.innerHTML = html;
    totalEl.innerText = `¥${total.toFixed(2)}`;
}

function submitOrder() {
    if (cart.length === 0) { alert("购物车为空！"); return; }
    const orderNo = "CHXW" + Date.now();
    const total = cart.reduce((s, i) => s + i.price * i.quantity, 0) / 100;
    const order = { orderNo, createTime: new Date().toLocaleString(), total, status: "待付款", items: cart };
    orders.push(order);
    localStorage.setItem("chxw_orders", JSON.stringify(orders));
    cart = [];
    localStorage.setItem("chxw_cart", JSON.stringify(cart));
    updateCartCount();
    renderUserOrders();
    alert(`订单提交成功！\n订单号：${orderNo}`);
    closeAll();
}

function renderUserOrders() {
    const el = document.getElementById("user-order-list");
    if (orders.length === 0) { el.innerHTML = "<div class='py-4'>暂无订单</div>"; return; }
    let html = "";
    orders.forEach(o => {
        html += `<div class='border-b py-2 text-left'><div>订单号：${o.orderNo}</div><div>¥${o.total.toFixed(2)} · ${o.status}</div><div class='text-xs text-gray-500'>${o.createTime}</div></div>`;
    });
    el.innerHTML = html;
}

function queryLogistics() {
    const no = document.getElementById("order-no").value;
    if (!no) { alert("请输入订单号"); return; }
    const el = document.getElementById("logistics-list");
    el.innerHTML = `
    <div class="logistics-item">2025-01-01 10:00 订单已提交</div>
    <div class="logistics-item">2025-01-01 14:30 商品已出库</div>
    <div class="logistics-item">2025-01-01 16:40 配送中</div>
    <div class="logistics-item text-blue-600 font-bold">预计今日送达</div>`;
}

function closeAll() { document.querySelectorAll(".modal").forEach(m => m.style.display = "none"); }

document.querySelectorAll(".close-modal").forEach(b => b.addEventListener("click", closeAll));
document.getElementById("user-btn").onclick = () => { document.getElementById("login-modal").style.display = "block"; };
document.getElementById("cart-btn").onclick = () => { renderCart(); document.getElementById("cart-modal").style.display = "block"; };
document.getElementById("cart-nav").onclick = () => { renderCart(); document.getElementById("cart-modal").style.display = "block"; };
document.getElementById("user-nav").onclick = () => { renderUserOrders(); document.getElementById("user-modal").style.display = "block"; };
document.getElementById("logistics-btn").onclick = () => { document.getElementById("logistics-modal").style.display = "block"; };
document.getElementById("checkout-btn").onclick = () => { closeAll(); document.getElementById("checkout-modal").style.display = "block"; };
document.getElementById("submit-order").onclick = submitOrder;
document.getElementById("query-logistics").onclick = queryLogistics;

window.onload = () => { loadProducts(); updateCartCount(); };
</script>
</body>
</html>
