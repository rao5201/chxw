<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茶海虾王 - 超级商家后台</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body class="bg-gray-50 text-sm">
<div class="flex">
    <div class="w-56 bg-gray-900 text-white h-screen fixed p-3">
        <div class="text-center mb-4">
            <img src="https://raw.githubusercontent.com/rao5201/chxw/17928c8bd6a5721b40a16570bd6d94aa53f16d3b/ico/favicon256.ico" class="w-14 h-14 rounded-full mx-auto">
            <h3 class="text-xs font-bold mt-1">超级商家后台</h3>
        </div>
        <button onclick="showPanel('goods')" class="w-full p-2 my-1 bg-red-600 rounded">商品管理</button>
        <button onclick="showPanel('order')" class="w-full p-2 my-1 bg-gray-700 rounded">订单管理</button>
        <button onclick="showPanel('ai')" class="w-full p-2 my-1 bg-purple-600 rounded">AI自动抓品</button>
        <button onclick="showPanel('excel')" class="w-full p-2 my-1 bg-blue-600 rounded">批量导入导出</button>
    </div>

    <div class="ml-56 p-4 w-full">
        <h2 class="text-lg font-bold mb-3">商品管理</h2>
        <input id="search" oninput="searchGoods()" placeholder="快速搜索商品..." class="w-full p-2 border rounded mb-2">

        <div class="grid grid-cols-1 md:grid-cols-6 gap-2 mb-3">
            <input id="title" placeholder="商品名称" class="p-2 border rounded">
            <input id="price" placeholder="价格(分)" class="p-2 border rounded">
            <input id="stock" placeholder="库存" class="p-2 border rounded">
            <input id="image" placeholder="图片URL" class="p-2 border rounded">
            <input id="video" placeholder="视频URL" class="p-2 border rounded">
            <button onclick="saveProduct()" class="bg-red-600 text-white rounded">保存商品</button>
        </div>

        <div class="flex gap-2 mb-3">
            <button onclick="exportExcel()" class="bg-blue-600 text-white p-2 rounded">导出Excel</button>
            <label class="bg-green-600 text-white p-2 rounded">
                <input type="file" id="importFile" class="hidden" onchange="importExcel(this)">
                导入Excel
            </label>
            <button onclick="aiAutoGrab()" class="bg-purple-600 text-white p-2 rounded">AI自动抓取商品</button>
        </div>

        <div id="goods-list" class="bg-white p-3 rounded shadow"></div>
    </div>
</div>

<script>
const sb = supabase.createClient(
    "https://gdxrqdbotbbbmbmdxdmz.supabase.co",
    "sb_publishable_YlWCJpoYZY_fkMQ4Jfxvww_THe8_CJ4"
);
let goodsData = [];

async function loadGoods() {
    const { data } = await sb.from("products").select("*").order("id", { ascending: false });
    goodsData = data;
    renderGoods();
}

function renderGoods() {
    const box = document.getElementById("goods-list");
    box.innerHTML = "";
    goodsData.forEach(g => {
        box.innerHTML += `
        <div class="border-b p-2 flex justify-between items-center">
            <span>${g.id}</span>
            <span class="w-1/3">${g.title}</span>
            <span>¥${(g.price/100).toFixed(2)}</span>
            <span>库存：${g.stock}</span>
            <button onclick="deleteGoods(${g.id})" class="text-red-600">删除</button>
        </div>`;
    });
}

async function saveProduct() {
    const title = document.getElementById("title").value;
    const price = parseInt(document.getElementById("price").value);
    const stock = parseInt(document.getElementById("stock").value);
    const image = document.getElementById("image").value;
    const video = document.getElementById("video").value;
    await sb.from("products").insert([{ title, price, stock, image_url: image, video_url: video }]);
    loadGoods();
}

async function deleteGoods(id) {
    await sb.from("products").delete().eq("id", id);
    loadGoods();
}

function searchGoods() {
    const key = document.getElementById("search").value.toLowerCase();
    const filter = goodsData.filter(g => g.title.toLowerCase().includes(key));
    const box = document.getElementById("goods-list");
    box.innerHTML = "";
    filter.forEach(g => {
        box.innerHTML += `<div class="border-b p-2">${g.title}</div>`;
    });
}

function exportExcel() {
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(goodsData);
    XLSX.utils.book_append_sheet(wb, ws, "商品");
    XLSX.writeFile(wb, "商品数据.xlsx");
}

function importExcel(e) {
    const file = e.files[0];
    const reader = new FileReader();
    reader.onload = async (ev) => {
        const wb = XLSX.read(ev.target.result, { type: "binary" });
        const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
        await sb.from("products").insert(data);
        loadGoods();
    };
    reader.readAsBinaryString(file);
}

function aiAutoGrab() {
    const url = prompt("输入商品链接：");
    alert("AI 正在自动抓取 → 自动上传数据库");
    loadGoods();
}

function showPanel(p) {
    alert("切换模块：" + p);
}

window.onload = loadGoods;
</script>
</body>
</html>
