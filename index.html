<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茶海虾王-官方正品商城</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei"}
header{background:#e60012;color:#fff;padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.logo-wrap{display:flex;align-items:center;gap:10px}
.logo{width:42px;height:42px;border-radius:50%;object-fit:cover}
.header-right a{color:#fff;text-decoration:none;margin-left:12px;padding:6px 10px;border:1px solid #fff;border-radius:4px}
.search-box{width:94%;margin:15px auto;display:block;padding:10px;border:1px solid #ddd;border-radius:8px;font-size:14px}
.container{width:94%;margin:0 auto;display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding-bottom:80px}
.goods-card{background:#fff;border-radius:10px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.goods-media{width:100%;height:180px;object-fit:cover}
.card-body{padding:10px}
.goods-title{font-size:15px;font-weight:bold;color:#333;margin-bottom:6px}
.goods-price{font-size:18px;color:#e60012;font-weight:bold;margin-bottom:4px}
.goods-stock{font-size:12px;color:#666;margin-bottom:8px}
.share-btn{width:100%;background:#0066cc;color:#fff;border:none;padding:8px;border-radius:6px;font-size:14px}
footer{text-align:center;padding:20px;font-size:12px;color:#999;background:#f5f5f5;margin-top:20px}
</style>
</head>
<body>
<header>
  <div class="logo-wrap">
    <img class="logo" src="https://raw.githubusercontent.com/rao5201/chxw/17928c8bd6a5721b40a16570bd6d94aa53f16d3b/ico/favicon256.ico">
    <h2>茶海虾王官方商城</h2>
  </div>
  <div class="header-right">
    <a href="admin.html">商家后台</a>
  </div>
</header>

<input type="text" class="search-box" id="searchInp" placeholder="输入商品名称搜索..." oninput="filterGoods()">
<div class="container" id="goodsContainer"></div>
<footer>
运营方：武穴茶海虾王电子商务中心 | 管理方：海南茶海虾王管理有限责任公司<br>客服邮箱：rao5201@126.com
</footer>

<script>
const supabaseUrl = "https://gdxrqdbotbbbmbmdxdmz.supabase.co";
const supabaseKey = "sb_publishable_YlWCJpoYZY_fkMQ4Jfxvww_THe8_CJ4";
const { createClient } = supabase;
const sb = createClient(supabaseUrl, supabaseKey);

let allGoods = [];

// 真实读取Supabase商品数据
async function loadAllGoods(){
  const { data, error } = await sb.from("products").select("*").order("id",{ascending:false});
  if(error){console.error(error);return;}
  allGoods = data;
  renderGoods(data);
}

function renderGoods(list){
  const container = document.getElementById("goodsContainer");
  container.innerHTML = "";
  list.forEach(item=>{
    let mediaDom = "";
    if(item.video_url){
      mediaDom = `<video class="goods-media" src="${item.video_url}" controls></video>`;
    }else if(item.image_url){
      mediaDom = `<img class="goods-media" src="${item.image_url}" alt="${item.title}">`;
    }else{
      mediaDom = `<div class="goods-media" style="background:#eee;display:flex;align-items:center;justify-content:center">暂无素材</div>`;
    }
    const priceYuan = (item.price / 100).toFixed(2);
    container.innerHTML += `
    <div class="goods-card">
      ${mediaDom}
      <div class="card-body">
        <h3 class="goods-title">${item.title}</h3>
        <div class="goods-price">¥${priceYuan}</div>
        <div class="goods-stock">库存：${item.stock}件</div>
        <button class="share-btn" onclick="shareItem('${item.title}',${item.price})">分享商品</button>
      </div>
    </div>
    `;
  });
}

// 真实前端搜索过滤
function filterGoods(){
  const kw = document.getElementById("searchInp").value.trim().toLowerCase();
  const filter = allGoods.filter(v=>v.title.toLowerCase().includes(kw));
  renderGoods(filter);
}

// 真实分享（无假链接）
function shareItem(title,price){
  const link = window.location.href;
  const text = `【茶海虾王】${title} 售价¥${(price/100).toFixed(2)}｜选购直达：${link}`;
  prompt("复制分享内容",text);
}

window.onload = loadAllGoods;
</script>
</body>
</html>
