<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>茶海虾王 - 官方商城</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100">
<header class="bg-red-600 text-white p-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="flex items-center gap-2">
            <img src="https://raw.githubusercontent.com/rao5201/chxw/17928c8bd6a5721b40a16570bd6d94aa53f16d3b/ico/favicon256.ico" class="w-10 h-10 rounded-full">
            <h1 class="text-xl font-bold">茶海虾王商城</h1>
        </div>
        <div class="flex gap-3">
            <button onclick="shareStore()" class="text-white"><i class="fas fa-share-alt"></i> 分享商城</button>
            <a href="admin.html" class="text-white"><i class="fas fa-cog"></i> 商家后台</a>
        </div>
    </div>
</header>

<div class="max-w-6xl mx-auto p-4 mt-2">
    <input oninput="searchProduct()" id="search" placeholder="快速搜索商品..." class="w-full p-2 border rounded mb-3">
    <div id="product-list" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
</div>

<footer class="text-center p-5 text-sm text-gray-500 mt-10">
运营方：武穴茶海虾王电子商务中心<br>
技术支持：rao5201@126.com
</footer>

<script>
const supabase = supabase.createClient(
    "https://gdxrqdbotbbbmbmdxdmz.supabase.co",
    "sb_publishable_YlWCJpoYZY_fkMQ4Jfxvww_THe8_CJ4"
);
let products = [];

async function loadProducts() {
    const { data } = await supabase.from("products").select("*").order("id", { ascending: false });
    products = data;
    renderProducts(data);
}

function renderProducts(data) {
    const container = document.getElementById("product-list");
    container.innerHTML = "";
    data.forEach(p => {
        container.innerHTML += `
        <div class="bg-white rounded shadow p-3">
            ${p.video_url ? `<video src="${p.video_url}" class="w-full h-44 object-cover rounded" controls></video>` :
            p.image_url ? `<img src="${p.image_url}" class="w-full h-44 object-cover rounded">` :
            `<div class="w-full h-44 flex items-center justify-center bg-gray-200">无图</div>`}
            <h3 class="font-bold mt-2">${p.title}</h3>
            <p class="text-red-600 font-bold text-lg">¥${(p.price / 100).toFixed(2)}</p>
            <p class="text-xs text-gray-500">库存：${p.stock}</p>
            <button onclick="shareProduct(${p.id})" class="mt-2 w-full bg-blue-600 text-white p-1 rounded text-sm">
            <i class="fas fa-share-alt"></i> 分享商品
            </button>
        </div>`;
    });
}

function searchProduct() {
    const keyword = document.getElementById("search").value.toLowerCase();
    const filtered = products.filter(p => p.title.toLowerCase().includes(keyword));
    renderProducts(filtered);
}

function shareProduct(id) {
    const item = products.find(i => i.id === id);
    prompt("分享商品：", `${item.title}\n价格：¥${(item.price/100).toFixed(2)}\n链接：${window.location.href}`);
}

function shareStore() {
    prompt("分享商城链接：", window.location.href);
}

window.onload = loadProducts;
</script>
</body>
</html>
