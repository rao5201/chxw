<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>茶海虾王网 - 综合电商平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --primary-red: #E60012; --primary-gold: #FFD700; }
        body { background-color: #f4f4f4; font-family: 'PingFang SC', sans-serif; padding-bottom: 60px; }
        .brand-red { background-color: var(--primary-red); color: white; }
        .text-gold { color: var(--primary-gold); }
        .bg-gold { background-color: var(--primary-gold); }
        .product-card { transition: all 0.2s; }
        .product-card:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <!-- 头部导航 -->
    <header class="brand-red sticky top-0 z-50 shadow-md">
        <div class="container mx-auto px-4 py-3">
            <div class="flex items-center justify-between mb-3">
                <div class="flex items-center gap-2">
                    <div class="w-10 h-10 bg-white rounded-full flex items-center justify-center text-red-600 font-bold text-xl shadow-inner">
                        <i class="fas fa-crown"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold tracking-wider">茶海虾王 CHXW</h1>
                        <p class="text-xs text-gold">官方旗舰</p>
                    </div>
                </div>
                <div class="relative cursor-pointer">
                    <i class="fas fa-shopping-cart text-2xl"></i>
                    <span class="absolute -top-2 -right-2 bg-gold text-red-600 text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
                </div>
            </div>
            <div class="relative">
                <input type="text" placeholder="搜索云端商品..." class="w-full py-2 px-4 rounded-l-lg focus:outline-none text-gray-700">
                <button class="absolute right-0 top-0 h-full bg-gold text-red-600 px-6 rounded-r-lg font-bold">搜索</button>
            </div>
        </div>
    </header>

    <!-- 商品列表区域 -->
    <section class="container mx-auto px-4 mt-6 mb-20">
        <h2 class="font-bold text-lg mb-4 border-l-4 border-red-600 pl-2">
            <i class="fas fa-fire mr-2"></i>热销爆款
        </h2>
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4" id="product-list">
            <!-- 默认商品 (如果数据库连接失败，显示这些) -->
            <div class="bg-white rounded-lg shadow p-3 product-card cursor-pointer relative overflow-hidden">
                <span class="absolute top-2 left-2 bg-red-600 text-white text-[10px] px-1 rounded z-10">热卖</span>
                <div class="h-40 bg-gray-50 rounded mb-2 flex items-center justify-center text-6xl">🍵</div>
                <h3 class="text-sm font-medium h-10 overflow-hidden text-gray-800">特级西湖龙井</h3>
                <div class="mt-2 flex items-end justify-between">
                    <div>
                        <span class="text-red-600 font-bold text-lg">¥ 298.00</span>
                        <span class="text-xs text-gray-400 ml-1">库存:99</span>
                    </div>
                    <button class="bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-700">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>
            <div class="bg-white rounded-lg shadow p-3 product-card cursor-pointer relative overflow-hidden">
                <span class="absolute top-2 left-2 bg-red-600 text-white text-[10px] px-1 rounded z-10">热卖</span>
                <div class="h-40 bg-gray-50 rounded mb-2 flex items-center justify-center text-6xl">🦞</div>
                <h3 class="text-sm font-medium h-10 overflow-hidden text-gray-800">鲜活波士顿龙虾</h3>
                <div class="mt-2 flex items-end justify-between">
                    <div>
                        <span class="text-red-600 font-bold text-lg">¥ 128.00</span>
                        <span class="text-xs text-gray-400 ml-1">库存:50</span>
                    </div>
                    <button class="bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-700">
                        <i class="fas fa-plus"></i>
                    </button>
                </div>
            </div>
        </div>
    </section>

    <!-- 底部导航 -->
    <nav class="fixed bottom-0 w-full bg-white border-t flex justify-around py-3 z-50 text-xs text-gray-600">
        <a href="#" class="flex flex-col items-center text-red-600"><i class="fas fa-home text-lg mb-1"></i>首页</a>
        <a href="admin.html" class="flex flex-col items-center"><i class="fas fa-cog text-lg mb-1"></i>后台</a>
        <a href="#" class="flex flex-col items-center"><i class="fas fa-shopping-bag text-lg mb-1"></i>购物车</a>
        <a href="#" class="flex flex-col items-center"><i class="fas fa-user text-lg mb-1"></i>我的</a>
    </nav>

    <script>
        // ==========================================
        // ⚠️ 修正：将变量名改为 supabaseClient，避免冲突
        // ==========================================
        const SUPABASE_URL = 'https://gdxrqdbotbbbmbmdxdmz.supabase.co'; 
        const SUPABASE_KEY = 'sb_publishable_YlWCJpoYZY_fkMQ4Jfxvww_THe8_CJ4';
        // 使用 supabaseClient 作为客户端实例名
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function loadProducts() {
            const list = document.getElementById('product-list');
            try {
                // 使用修正后的变量名
                let { data: products, error } = await supabaseClient.from('products').select('*');
                if (error || !products || products.length === 0) {
                    // 如果数据库没数据，就保持上面写死的默认商品
                    return;
                }
                // 如果数据库有数据，就动态生成
                list.innerHTML = '';
                products.forEach(p => {
                    const price = (p.price / 100).toFixed(2);
                    list.innerHTML += `
                        <div class="bg-white rounded-lg shadow p-3 product-card cursor-pointer relative overflow-hidden">
                            <div class="h-40 bg-gray-50 rounded mb-2 flex items-center justify-center text-6xl">📦</div>
                            <h3 class="text-sm font-medium h-10 overflow-hidden text-gray-800">\${p.title}</h3>
                            <div class="mt-2 flex items-end justify-between">
                                <div>
                                    <span class="text-red-600 font-bold text-lg">¥\${price}</span>
                                </div>
                                <button class="bg-red-600 text-white w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-700">
                                    <i class="fas fa-plus"></i>
                                </button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) {
                console.log("数据库连接失败，使用离线默认数据");
            }
        }
        loadProducts();
    </script>
</body>
</html>
